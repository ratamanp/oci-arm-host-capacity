name: OCI ARM Catcher
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  catch:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/key.pem
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          EOF
          chmod 600 ~/.oci/config

      - name: Write SSH public key to file
        run: echo "${{ secrets.OCI_SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

      - name: Sanitize OCID secrets (strip ANY invisible character)
        run: |
          # Extrae solo el patron valido de un OCID (letras, numeros, puntos)
          # sin importar que caracter invisible (espacio normal, nbsp, tab, etc)
          # se haya colado alrededor.
          extract_ocid() { echo "$1" | grep -oE 'ocid1\.[A-Za-z0-9.-]+' | head -1; }
          extract_num()  { echo "$1" | grep -oE '[0-9]+' | head -1; }
          extract_ad()   { echo "$1" | grep -oE '[A-Za-z0-9:_-]+' | head -1; }
          extract_shape(){ echo "$1" | grep -oE '[A-Za-z0-9.]+' | head -1; }

          {
            echo "COMPARTMENT_ID=$(extract_ocid "${{ secrets.OCI_TENANCY_OCID }}")"
            echo "SUBNET_ID=$(extract_ocid "${{ secrets.OCI_SUBNET_OCID }}")"
            echo "IMAGE_ID=$(extract_ocid "${{ secrets.OCI_IMAGE_ID }}")"
            echo "SHAPE=$(extract_shape "${{ secrets.OCI_SHAPE }}")"
            echo "OCPUS=$(extract_num "${{ secrets.OCI_OCPUS }}")"
            echo "MEMORY_GBS=$(extract_num "${{ secrets.OCI_MEMORY_IN_GBS }}")"
            echo "AVAILABILITY_DOMAIN=$(extract_ad "${{ secrets.OCI_AVAILABILITY_DOMAIN }}")"
          } >> "$GITHUB_ENV"

      - name: Show sanitized values (lengths only, to verify no hidden chars)
        run: |
          echo "COMPARTMENT_ID length: ${#COMPARTMENT_ID}"
          echo "SUBNET_ID length: ${#SUBNET_ID}"
          echo "IMAGE_ID length: ${#IMAGE_ID}"
          echo "SHAPE: $SHAPE"
          echo "OCPUS: $OCPUS"
          echo "MEMORY_GBS: $MEMORY_GBS"
          echo "AVAILABILITY_DOMAIN: $AVAILABILITY_DOMAIN"

      - name: Try to launch the instance
        run: |
          set +e
          OUTPUT=$(oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AVAILABILITY_DOMAIN" \
            --shape "$SHAPE" \
            --shape-config "{\"ocpus\": $OCPUS, \"memoryInGBs\": $MEMORY_GBS}" \
            --image-id "$IMAGE_ID" \
            --subnet-id "$SUBNET_ID" \
            --assign-public-ip true \
            --display-name "auto-vm-$(date +%Y%m%d-%H%M)" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            --wait-for-state RUNNING \
            --max-wait-seconds 60 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo ""
            echo "🎉🎉🎉 INSTANCIA CREADA! Revisa OCI Console -> Compute -> Instances 🎉🎉🎉"
            exit 0
          fi

          if echo "$OUTPUT" | grep -qiE "Out of host capacity|InternalError|TooManyRequests"; then
            echo ""
            echo "Sin capacidad todavia. Se reintentara en la proxima corrida programada."
            exit 0
          fi

          echo ""
          echo "Error real (no es falta de capacidad), revisa la configuracion:"
          exit 1
