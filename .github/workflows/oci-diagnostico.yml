name: OCI Diagnostico
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/key.pem
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          EOF
          chmod 600 ~/.oci/config

      - name: Confirm region and tenancy
        run: |
          echo "Region configurada: ${{ secrets.OCI_REGION }}"
          oci iam region list --query "data[?key=='$(echo ${{ secrets.OCI_REGION }} | tr a-z A-Z)']" || true

      - name: List compartments
        run: |
          echo "=== Compartimentos ==="
          oci iam compartment list --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" --all --output table --query "data[*].{Name:name, ID:id}" || echo "FALLO listando compartimentos"

      - name: List availability domains
        run: |
          echo "=== Availability Domains reales ==="
          oci iam availability-domain list --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" --output table || echo "FALLO listando ADs"

      - name: List subnets in tenancy root
        run: |
          echo "=== Subnets en compartimento raiz (tenancy) ==="
          oci network subnet list --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" --all --output table --query "data[*].{Name:'display-name', ID:id, VCN:'vcn-id'}" || echo "FALLO listando subnets en raiz"

      - name: List ARM images available
        run: |
          echo "=== Imagenes ARM (Ubuntu) disponibles ==="
          oci compute image list --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" --operating-system "Canonical Ubuntu" --shape "VM.Standard.A1.Flex" --all --output table --query "data[*].{Name:'display-name', ID:id}" || echo "FALLO listando imagenes"

      - name: Show what is currently in secrets (for comparison)
        run: |
          echo "=== Lo que tienes guardado en secrets ==="
          echo "OCI_SUBNET_OCID:        ${{ secrets.OCI_SUBNET_OCID }}"
          echo "OCI_IMAGE_ID:           ${{ secrets.OCI_IMAGE_ID }}"
          echo "OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}"
          echo "OCI_TENANCY_OCID:       ${{ secrets.OCI_TENANCY_OCID }}"
