name: Create OCI Instance

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Create .env and Private Key File
        run: |
          echo "${{ secrets.OCI_KEY_FILE || secrets.OCI_PRIVATE_KEY || secrets.OCI_KEY_CONTENT }}" > oracle_key.pem
          chmod 600 oracle_key.pem

          echo "OCI_REGION=${{ secrets.OCI_REGION }}" > .env
          echo "OCI_USER_ID=${{ secrets.OCI_USER_ID || secrets.OCI_USER_OCID }}" >> .env
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID || secrets.OCI_TENANCY_OCID }}" >> .env
          echo "OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT || secrets.OCI_FINGERPRINT }}" >> .env
          echo "OCI_KEY_FILE=oracle_key.pem" >> .env
          echo "OCI_COMPARTMENT_ID=${{ secrets.OCI_COMPARTMENT_ID || secrets.OCI_COMPARTMENT_OCID }}" >> .env
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID || secrets.OCI_SUBNET_OCID }}" >> .env
          echo "OCI_OCPUS=${{ secrets.OCI_OCPUS || '4' }}" >> .env
          echo "OCI_MEMORY_IN_GBS=${{ secrets.OCI_MEMORY_IN_GBS || '24' }}" >> .env
          echo "OCI_SSH_PUBLIC_KEY='${{ secrets.OCI_SSH_PUBLIC_KEY }}'" >> .env

      - name: Run Instance Creation Script
        run: php index.php
