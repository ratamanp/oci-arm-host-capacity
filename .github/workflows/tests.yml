name: Create OCI Instance

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Create Private Key File and .env
        env:
          PRIVATE_KEY: ${{ secrets.OCI_KEY_FILE || secrets.OCI_PRIVATE_KEY || secrets.OCI_KEY_CONTENT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID || secrets.OCI_USER_OCID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID || secrets.OCI_TENANCY_OCID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT || secrets.OCI_FINGERPRINT }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID || secrets.OCI_COMPARTMENT_OCID }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID || secrets.OCI_SUBNET_OCID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          # 1. Crear el archivo de la llave privada
          echo "$PRIVATE_KEY" > oracle_key.pem
          chmod 600 oracle_key.pem

          # 2. Generar el archivo .env de forma limpia usando PHP
          php -r '
            $env = [
              "OCI_REGION" => getenv("OCI_REGION"),
              "OCI_USER_ID" => getenv("OCI_USER_ID"),
              "OCI_TENANCY_ID" => getenv("OCI_TENANCY_ID"),
              "OCI_KEY_FINGERPRINT" => getenv("OCI_KEY_FINGERPRINT"),
              "OCI_KEY_FILE" => "oracle_key.pem",
              "OCI_COMPARTMENT_ID" => getenv("OCI_COMPARTMENT_ID"),
              "OCI_SUBNET_ID" => getenv("OCI_SUBNET_ID"),
              "OCI_OCPUS" => getenv("OCI_OCPUS") ?: "4",
              "OCI_MEMORY_IN_GBS" => getenv("OCI_MEMORY_IN_GBS") ?: "24",
              "OCI_SSH_PUBLIC_KEY" => getenv("OCI_SSH_PUBLIC_KEY"),
            ];
            $content = "";
            foreach ($env as $k => $v) {
              $content .= $k . "=\"" . addcslashes($v ?? "", "\"\\$") . "\"\n";
            }
            file_put_contents(".env", $content);
          '

      - name: Run Instance Creation Script
        run: php index.php
