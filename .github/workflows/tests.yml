name: Create OCI Instance

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Create Private Key File
        run: |
          echo "${{ secrets.OCI_KEY_FILE }}" > oracle_key.pem
          chmod 600 oracle_key.pem

      - name: Create .env File
        run: |
          printf 'OCI_REGION="%s"\n' "${{ secrets.OCI_REGION }}" > .env
          printf 'OCI_USER_ID="%s"\n' "${{ secrets.OCI_USER_OCID }}" >> .env
          printf 'OCI_TENANCY_ID="%s"\n' "${{ secrets.OCI_TENANCY_OCID }}" >> .env
          printf 'OCI_KEY_FINGERPRINT="%s"\n' "${{ secrets.OCI_FINGERPRINT }}" >> .env
          printf 'OCI_KEY_FILE="%s"\n' "oracle_key.pem" >> .env
          printf 'OCI_COMPARTMENT_ID="%s"\n' "${{ secrets.OCI_COMPARTMENT_OCID }}" >> .env
          printf 'OCI_SUBNET_ID="%s"\n' "${{ secrets.OCI_SUBNET_OCID }}" >> .env
          printf 'OCI_OCPUS="%s"\n' "${{ secrets.OCI_OCPUS || '4' }}" >> .env
          printf 'OCI_MEMORY_IN_GBS="%s"\n' "${{ secrets.OCI_MEMORY_IN_GBS || '24' }}" >> .env
          printf 'OCI_SSH_PUBLIC_KEY="%s"\n' "${{ secrets.OCI_SSH_PUBLIC_KEY }}" >> .env

      - name: Run Instance Creation Script
        env:
          OCI_KEY_FILE: oracle_key.pem
        run: php index.php
