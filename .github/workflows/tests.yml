name: Create OCI Instance

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate clean .env and key file
        env:
          RAW_KEY: ${{ secrets.OCI_KEY_FILE }}
          RAW_USER: ${{ secrets.OCI_USER_OCID }}
          RAW_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          RAW_COMPARTMENT: ${{ secrets.OCI_COMPARTMENT_OCID }}
          RAW_SUBNET: ${{ secrets.OCI_SUBNET_OCID }}
          RAW_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          RAW_REGION: ${{ secrets.OCI_REGION }}
          RAW_SSH_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          RAW_OCPUS: ${{ secrets.OCI_OCPUS }}
          RAW_MEMORY: ${{ secrets.OCI_MEMORY_IN_GBS }}
        run: |
          python3 -c '
          import os

          # 1. Guardar la llave privada pem
          key_data = os.environ.get("RAW_KEY", "").strip()
          with open("oracle_key.pem", "w") as f:
              f.write(key_data + "\n")

          # 2. Mapear tus Secrets a los nombres exactos que pide el script de PHP
          env_vars = {
              "OCI_REGION": os.environ.get("RAW_REGION", "").strip(),
              "OCI_USER_ID": os.environ.get("RAW_USER", "").strip(),
              "OCI_TENANCY_ID": os.environ.get("RAW_TENANCY", "").strip(),
              "OCI_KEY_FINGERPRINT": os.environ.get("RAW_FINGERPRINT", "").strip(),
              "OCI_KEY_FILE": "oracle_key.pem",
              "OCI_COMPARTMENT_ID": os.environ.get("RAW_COMPARTMENT", "").strip(),
              "OCI_SUBNET_ID": os.environ.get("RAW_SUBNET", "").strip(),
              "OCI_OCPUS": os.environ.get("RAW_OCPUS", "4").strip(),
              "OCI_MEMORY_IN_GBS": os.environ.get("RAW_MEMORY", "24").strip(),
              "OCI_SSH_PUBLIC_KEY": os.environ.get("RAW_SSH_KEY", "").strip(),
          }

          # 3. Escribir el .env limpio protegiendo comillas y saltos
          with open(".env", "w") as f:
              for k, v in env_vars.items():
                  clean_val = v.replace("\n", "").replace("\"", "\\\"")
                  f.write(f"{k}=\"{clean_val}\"\n")

          print("Configuracion procesada con exito.")
          '
          chmod 600 oracle_key.pem

      - name: Run Instance Creation Script
        run: php index.php
