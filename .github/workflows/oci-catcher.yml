name: OCI ARM Catcher
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  catch:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/key.pem
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          EOF
          chmod 600 ~/.oci/config

      - name: Write SSH public key to file
        run: echo "${{ secrets.OCI_SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

      - name: Sanitize OCID secrets (strip stray spaces/newlines)
        run: |
          trim() { echo "$1" | tr -d ' \t\n\r'; }
          {
            echo "COMPARTMENT_ID=$(trim "${{ secrets.OCI_TENANCY_OCID }}")"
            echo "SUBNET_ID=$(trim "${{ secrets.OCI_SUBNET_OCID }}")"
            echo "IMAGE_ID=$(trim "${{ secrets.OCI_IMAGE_ID }}")"
            echo "SHAPE=$(trim "${{ secrets.OCI_SHAPE }}")"
            echo "OCPUS=$(trim "${{ secrets.OCI_OCPUS }}")"
            echo "MEMORY_GBS=$(trim "${{ secrets.OCI_MEMORY_IN_GBS }}")"
          } >> "$GITHUB_ENV"
          # Availability domain keeps its internal colon/spaces around the code, only trim edges
          AD=$(echo "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" | sed 's/^[ \t\r\n]*//;s/[ \t\r\n]*$//')
          echo "AVAILABILITY_DOMAIN=$AD" >> "$GITHUB_ENV"

      - name: Try to launch the instance
        run: |
          set +e
          OUTPUT=$(oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AVAILABILITY_DOMAIN" \
            --shape "$SHAPE" \
            --shape-config "{\"ocpus\": $OCPUS, \"memoryInGBs\": $MEMORY_GBS}" \
            --image-id "$IMAGE_ID" \
            --subnet-id "$SUBNET_ID" \
            --assign-public-ip true \
            --display-name "auto-vm-$(date +%Y%m%d-%H%M)" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            --wait-for-state RUNNING \
            --max-wait-seconds 60 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo ""
            echo "🎉🎉🎉 INSTANCIA CREADA! Revisa OCI Console -> Compute -> Instances 🎉🎉🎉"
            exit 0
          fi

          if echo "$OUTPUT" | grep -qiE "Out of host capacity|InternalError|TooManyRequests"; then
            echo ""
            echo "Sin capacidad todavia. Se reintentara en la proxima corrida programada."
            exit 0
          fi

          echo ""
          echo "Error real (no es falta de capacidad), revisa la configuracion:"
          exit 1
