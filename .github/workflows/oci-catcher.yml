name: OCI ARM Catcher
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  catch:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/key.pem
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          EOF
          chmod 600 ~/.oci/config

      - name: Write SSH public key to file
        run: echo "${{ secrets.OCI_SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

      - name: Try to launch the instance
        run: |
          set +e
          OUTPUT=$(oci compute instance launch \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --availability-domain "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" \
            --shape "${{ secrets.OCI_SHAPE }}" \
            --shape-config "{\"ocpus\": ${{ secrets.OCI_OCPUS }}, \"memoryInGBs\": ${{ secrets.OCI_MEMORY_IN_GBS }}}" \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_OCID }}" \
            --assign-public-ip true \
            --display-name "auto-vm-$(date +%Y%m%d-%H%M)" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            --wait-for-state RUNNING \
            --max-wait-seconds 60 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo ""
            echo "🎉🎉🎉 INSTANCIA CREADA! Revisa OCI Console -> Compute -> Instances 🎉🎉🎉"
            exit 0
          fi

          if echo "$OUTPUT" | grep -qiE "Out of host capacity|InternalError|TooManyRequests"; then
            echo ""
            echo "Sin capacidad todavia. Se reintentara en la proxima corrida programada."
            exit 0
          fi

          echo ""
          echo "Error real (no es falta de capacidad), revisa la configuracion:"
          exit 1
